<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Life</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --accent: #26e;
      --muted: #678;
      --bg: #012;
      --panel: #162;
      --text: #fff;
    }
    body { font-family: Arial, sans-serif; padding: 20px; background: #040404; color: var(--text); }
    h2 { margin-top: 10px; }
    label { display: block; margin: 6px 0 2px; }
    input[type="number"] { width: 120px; margin-bottom: 8px; }
    button { margin-top: 12px; padding: 8px 14px; }
    #result { margin-top: 18px; font-weight: 600; white-space: pre-wrap; background:#222; padding:12px; border-radius:8px; border:1px solid #363e18; }
    .stats { margin-top: 8px; font-style: italic; color:var(--muted) }
    .nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 0 auto 12px;
      padding: 8px 0;
    }
    .card {
      display: inline-block;
      text-decoration: none; /* remove underline */
      color: inherit;        /* keep text color */
      background: var(--panel);
      border: 1px solid #dfe6f6;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }
    .card:hover {
      background: var(--accent);
      color: #081326;
      transform: translateY(-4px);
    }
    .small-note { font-size:0.9rem; color:var(--muted); margin-top:8px; }
    .grid-row { display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
    .column { min-width:200px; }
    .simple-table th, .simple-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #f0f6ff;
      color: var(--text);
      text-align: center;
    }
  </style>
</head>

<body>
  <h1> Placeholder Text - by Kayzee</h1>
  <h2 style="font-weight:normal">Instructions</h2>
  <h3>1. Ooops! Looks like you are too fast</h3>
  <h3>2. Take another deep breath, and try again</h3>

  <div class="grid-row">
    <div class="column">
      <div class="nav" style="margin-top:20px;">
        <a href="https://ieagalei.github.io/Life/" class="card" target="_blank" rel="noopener noreferrer">
          <div class="icon">🍃</div>
          <div>Life - by Kayzee</div>
        </a>
        <a href="https://www.youtube.com/channel/UCsXVk37bltHxD1rDPwtNM8Q" class="card" target="_blank" rel="noopener noreferrer">
          <div class="icon">🌰🐿️</div>
          <div>Youtube - Kurzgesagt – In a Nutshell</div>
        </a>
        <a href="career.html" class="card">
          <div class="icon">🛠️</div>
          <div>Career</div>
        </a>
        <a href="text.html" class="card">
          <div class="icon">👷</div>
          <div>Text</div>
        </a>
      </div>
    </div>
  </div>

  <script>
// place for codes
  </script>
</body>
</html>
