<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🛠️ Career</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --accent: #26e;
      --muted: #678;
      --bg: #012;
      --panel: #162;
      --text: #fff;
    }
    body { font-family: Arial, sans-serif; padding: 20px; background: #040404; color: var(--text); }
    h2 { margin-top: 10px; }
    label { display: block; margin: 6px 0 2px; }
    input[type="number"] { width: 120px; margin-bottom: 8px; }
    button { margin-top: 12px; padding: 8px 14px; }
    #result { margin-top: 18px; font-weight: 600; white-space: pre-wrap; background:#222; padding:12px; border-radius:8px; border:1px solid #363e18; }
    #youBox { margin-top: 18px; font-weight: 600; white-space: pre-wrap; background:#222;}
    #jobBox { margin-top: 18px; font-weight: 600; white-space: pre-wrap; background:#222;}
    #appBox { margin-top: 18px; font-weight: 600; white-space: pre-wrap; background:#222;}
    #talkBox { margin-top: 18px; font-weight: 600; white-space: pre-wrap; background:#222;}
    
    .stats { margin-top: 8px; font-style: italic; color:var(--muted) }
    .nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 0 auto 12px;
      padding: 8px 0;
    }
    .card {
      display: inline-block;
      text-decoration: none; /* remove underline */
      color: inherit;        /* keep text color */
      background: var(--panel);
      border: 1px solid #dfe6f6;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }
    .card:hover {
      background: var(--accent);
      color: #081326;
      transform: translateY(-4px);
    }
    .small-note { font-size:0.9rem; color:var(--muted); margin-top:8px; }
    .grid-row { display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
    .column { min-width:200px; }
    .simple-table th, .simple-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #f0f6ff;
      color: var(--text);
      text-align: center;
    }
  </style>
</head>

<body>
  <h1> 🛠️ Career - by Kayzee</h1>
  <h2 style="font-weight:normal">Instructions</h2>
  <h3>1. There are some summaries below</h3>
  <h3>2. You may need to google for (quizzes) and examples</h3>

  <div style="margin-top:12px;">
    <button onclick="youBtn()">Show/Hide #1</button>
    <div id="youBox">Who are you?</div>
  </div>

  <div style="margin-top:12px;">
    <button onclick="jobBtn()">Show/Hide #2</button>
    <div id="jobBox">What to do?</div>
  </div>

  <div style="margin-top:12px;">
    <button onclick="appBtn()">Show/Hide #3</button>
    <div id="appBox">Apply, apply!</div>
  </div>

  <div style="margin-top:12px;">
    <button onclick="talkBtn()">Show/Hide #4</button>
    <div id="talkBox">Practice, practice, practice!</div>
  </div>

  <div class="grid-row">
    <div class="column">
      <div class="nav" style="margin-top:20px;">
        <a href="https://ieagalei.github.io/Life/" class="card" rel="noopener noreferrer">
          <div class="icon">🍃</div>
          <div>Life - by Kayzee</div>
        </a>
        <a href="https://www.youtube.com/channel/UCsXVk37bltHxD1rDPwtNM8Q" class="card" target="_blank" rel="noopener noreferrer">
          <div class="icon">🌰🐿️</div>
          <div>Youtube - Kurzgesagt – In a Nutshell</div>
        </a>
        <a href="business.html" class="card">
          <div class="icon">🌳</div>
          <div>Business</div>
        </a>
        <a href="text.html" class="card">
          <div class="icon">👷</div>
          <div>Text</div>
        </a>
      </div>
    </div>
  </div>

  <script>

    // Helpers
    const $ = id => document.getElementById(id);

    function youBtn() {
      let youText = '';
	if ($('youBox').textContent === 'Who are you?') {
          youText += `1. Who are you? (personality, values, interests, VITALS)\n`;
          youText += `2. Understand your skills (quizzes for Strength/Weaknesses)\n`;
          youText += `- Hard Skills, Soft Skills, Transferrable Skills, Training options\n`;
          youText += `3. Identify suitable career paths (general jobs, or career specific)\n`;
          youText += `Outcome: Clear understanding of yourself and suitable career options`;
        } else {
          youText = 'Who are you?';
        }
      $('youBox').textContent = youText;
    }

    function jobBtn() {
      let jobText = '';
	if ($('jobBox').textContent === 'What to do?') {
          jobText += `1. Research industries, roles, and job market trends\n`;
          jobText += `2. Understand job requirements and expectations -> don't apply if not a match\n`;
          jobText += `3. Match your skills to roles\n`;
          jobText += `3. Research employers and company values -> Cover letter, interviews\n`;
          jobText += `Outcome: Target roles and understanding of what employers want`;
        } else {
          jobText = 'What to do?';
        }
      $('jobBox').textContent = jobText;
    }

    function appBtn() {
      let appText = '';
	if ($('appBox').textContent === 'Apply, apply!') {
          appText += `1. Resume structure and tailoring -> different resume for each industry\n`;
          appText += `2. Writing effective cover letters -> always a new one for each job\n`;
          appText += `3. Have strong and personal introduction and presence\n`;
          appText += `4. Update Linked in, Seek or other relevant profiles\n`;
          appText += `Outcome: Strong, tailored applications and visibility to employers`;
        } else {
          appText = 'Apply, apply!';
        }
      $('appBox').textContent = appText;
    }

    function talkBtn() {
      let talkText = '';
	if ($('talkBox').textContent === 'Practice, practice, practice!') {
          talkText += `1. Always prepare and practice communication and delivery.\n`;
          talkText += `2. Easy to get 10-20 common questions, but also consider personality or technical ones\n`;
          talkText += `3. Structure delivery, avoid jargon, STAR examples\n`;
          talkText += `4. Be proactive, polite, thankful, resilient and persistent\n`;
          talkText += `Outcome: Confidence in interviews and long-term career mindset`;
        } else {
          talkText = 'Practice, practice, practice!';
        }
      $('talkBox').textContent = talkText;
    }

  </script>
</body>
</html>
